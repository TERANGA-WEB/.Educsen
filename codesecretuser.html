<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/images/icon-192x192.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Code secret · ÉducSen</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue:       #2563eb;
            --blue-light: #3b82f6;
            --blue-glow:  rgba(37,99,235,0.16);
            --violet:     #7c3aed;
            --surface:    #ffffff;
            --bg:         #f0f4ff;
            --text:       #0f172a;
            --muted:      #64748b;
            --border:     #e2e8f0;
            --error:      #ef4444;
            --error-bg:   #fef2f2;
            --r-card:     28px;
            --r-in:       18px;
            --r-btn:      100px;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
            position: relative; overflow: hidden;
        }
        body::before {
            content:'';
            position: fixed; inset:0;
            background:
                radial-gradient(ellipse 80% 60% at 10% 0%, rgba(37,99,235,.10) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 100%, rgba(124,58,237,.10) 0%, transparent 60%);
            pointer-events: none;
        }
        body::after {
            content:'';
            position: fixed; inset:0;
            background-image: radial-gradient(circle, rgba(37,99,235,.07) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
        }

        .wrap { width:100%; max-width:420px; position:relative; z-index:10; }

        /* BRAND */
        .brand {
            display:flex; align-items:center; gap:.6rem;
            justify-content:center; margin-bottom:1.8rem;
        }
        .brand-icon {
            width:40px; height:40px;
            background: linear-gradient(135deg, var(--blue), var(--violet));
            border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            font-size:1.2rem;
            box-shadow: 0 4px 12px var(--blue-glow);
        }
        .brand-name {
            font-family:'DM Serif Display',serif;
            font-size:1.25rem; color:var(--text); letter-spacing:-.01em;
        }
        .brand-name span { color:var(--blue); }

        /* CARD */
        .card {
            background: var(--surface);
            border-radius: var(--r-card);
            padding: 2.5rem 2rem 2rem;
            box-shadow:
                0 1px 2px rgba(0,0,0,.04),
                0 8px 24px rgba(37,99,235,.08),
                0 32px 48px rgba(0,0,0,.06);
            border: 1px solid rgba(255,255,255,.9);
        }

        /* HEADER */
        .card-header { text-align:center; margin-bottom:1.75rem; }
        .lock-ring {
            width:64px; height:64px; border-radius:50%;
            background: linear-gradient(135deg,#eff6ff,#f5f3ff);
            border:1.5px solid var(--border);
            display:flex; align-items:center; justify-content:center;
            font-size:1.75rem;
            margin:0 auto 1rem;
            box-shadow: 0 4px 12px var(--blue-glow);
        }
        .card-title {
            font-family:'DM Serif Display',serif;
            font-size:1.55rem; color:var(--text);
            margin-bottom:.35rem; letter-spacing:-.02em;
        }
        .card-sub { font-size:.875rem; color:var(--muted); }

        .divider { height:1px; background:var(--border); margin:0 -2rem 1.75rem; }

        /* INPUTS */
        .digits-label {
            font-size:.72rem; font-weight:600;
            text-transform:uppercase; letter-spacing:.08em;
            color:var(--muted); text-align:center; margin-bottom:1rem;
        }
        .digits-row {
            display:flex; gap:.75rem;
            justify-content:center; margin-bottom:1.25rem;
        }
        .digit-box {
            width: clamp(3.5rem,17vw,4.8rem);
            height: clamp(4rem,19vw,5.5rem);
            background:#f8fafc;
            border:1.5px solid var(--border);
            border-radius:var(--r-in);
            font-family:'DM Serif Display',serif;
            font-size: clamp(1.9rem,7vw,2.6rem);
            text-align:center; color:var(--text);
            outline:none;
            transition: border-color .2s, box-shadow .2s, transform .15s, background .2s;
            -webkit-appearance:none; -moz-appearance:textfield;
            caret-color:var(--blue); line-height:1;
        }
        .digit-box::-webkit-outer-spin-button,
        .digit-box::-webkit-inner-spin-button { -webkit-appearance:none; }
        .digit-box:focus {
            border-color:var(--blue); background:#fff;
            box-shadow: 0 0 0 4px var(--blue-glow), 0 4px 12px rgba(37,99,235,.12);
            transform:translateY(-2px);
        }
        .digit-box.filled { border-color:var(--blue-light); background:#eff6ff; color:var(--blue); }
        .digit-box.error  { border-color:var(--error); background:var(--error-bg); color:var(--error); animation:shake .35s ease both; }
        @keyframes shake {
            0%,100%{transform:translateX(0)}
            20%{transform:translateX(-6px)}
            40%{transform:translateX(6px)}
            60%{transform:translateX(-4px)}
            80%{transform:translateX(4px)}
        }

        /* DOTS */
        .dots-row { display:flex; gap:.4rem; justify-content:center; margin-bottom:1.75rem; }
        .dot { width:7px; height:7px; border-radius:50%; background:var(--border); transition:background .2s, transform .2s; }
        .dot.active { background:var(--blue); transform:scale(1.3); }

        /* BTN */
        .btn {
            width:100%; display:flex; align-items:center; justify-content:center; gap:.5rem;
            background:linear-gradient(135deg,var(--blue),var(--violet));
            color:#fff;
            font-family:'DM Sans',sans-serif; font-weight:600;
            font-size:.975rem; letter-spacing:.02em;
            padding:.9rem 1.5rem;
            border:none; border-radius:var(--r-btn); cursor:pointer;
            transition:opacity .2s, transform .2s, box-shadow .2s;
            box-shadow:0 4px 16px rgba(37,99,235,.35);
            position:relative; overflow:hidden;
        }
        .btn::after {
            content:''; position:absolute; inset:0;
            background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
            opacity:0; transition:opacity .2s;
        }
        .btn:hover:not(:disabled)::after { opacity:1; }
        .btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 24px rgba(37,99,235,.45); }
        .btn:active:not(:disabled) { transform:translateY(0); }
        .btn:disabled { opacity:.45; cursor:not-allowed; box-shadow:none; }

        .spinner {
            width:1.1rem; height:1.1rem;
            border:2.5px solid rgba(255,255,255,.35);
            border-top-color:#fff; border-radius:50%;
            animation:spin .8s linear infinite;
        }
        @keyframes spin { to{transform:rotate(360deg)} }

        /* ERROR */
        .error-box {
            display:none; margin-top:1.25rem;
            padding:.875rem 1rem;
            background:var(--error-bg);
            border:1px solid rgba(239,68,68,.25); border-left:3px solid var(--error);
            border-radius:12px;
            font-size:.875rem; color:#b91c1c; font-weight:500;
            animation:slideIn .25s ease;
        }
        .error-box.show { display:block; }
        @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

        /* BADGE */
        .secure-badge {
            display:flex; align-items:center; justify-content:center; gap:.4rem;
            margin-top:1.5rem;
            font-size:.78rem; color:var(--muted); font-weight:500;
        }

        /* LOADER */
        .init-loader {
            display:flex; flex-direction:column; align-items:center;
            padding:3rem 1rem; gap:1rem;
            color:var(--muted); font-size:.9rem; font-weight:500;
        }
        .init-loader .big-spin {
            width:2.5rem; height:2.5rem;
            border:3px solid var(--border); border-top-color:var(--blue);
            border-radius:50%; animation:spin 1s linear infinite;
        }

        .hidden { display:none !important; }

        @media (max-width:440px) {
            .card { padding:2rem 1.4rem 1.6rem; }
            .divider { margin:0 -1.4rem 1.5rem; }
        }
        @media (max-width:340px) {
            .digits-row { gap:.5rem; }
        }
    </style>
</head>
<body>
<div class="wrap">

    <div class="card">

        <div id="initLoader" class="init-loader">
            <div class="big-spin"></div>
            <span>Vérification de la session…</span>
        </div>

        <div id="formWrap" class="hidden">

            <div class="card-header">
                <div class="lock-ring">🔐</div>
                <h1 class="card-title">Code secret</h1>
                <p class="card-sub">Saisissez votre code à 4 chiffres</p>
            </div>

            <div class="divider"></div>

            <p class="digits-label">Votre code</p>

            <div class="digits-row">
                <input type="text" inputmode="numeric" pattern="\d*" maxlength="1"
                       class="digit-box" id="d1" autocomplete="one-time-code">
                <input type="text" inputmode="numeric" pattern="\d*" maxlength="1"
                       class="digit-box" id="d2">
                <input type="text" inputmode="numeric" pattern="\d*" maxlength="1"
                       class="digit-box" id="d3">
                <input type="text" inputmode="numeric" pattern="\d*" maxlength="1"
                       class="digit-box" id="d4">
            </div>

            <div class="dots-row">
                <div class="dot" id="dot1"></div>
                <div class="dot" id="dot2"></div>
                <div class="dot" id="dot3"></div>
                <div class="dot" id="dot4"></div>
            </div>

            <button class="btn" id="submitBtn" disabled>
                <span id="btnText">Se connecter</span>
                <span id="btnSpin" class="spinner hidden"></span>
            </button>

            <div id="errorBox" class="error-box"></div>

            <div class="secure-badge">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                Connexion chiffrée et sécurisée
            </div>

        </div>
    </div>
</div>

<script type="module">
    import { initializeApp }                        from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { getFirestore, doc, getDoc }            from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD7B-0O9mOdbIDQV-g6hsZx07G2ZvzKoxo",
        authDomain: "real-educsen.firebaseapp.com",
        projectId: "real-educsen",
        storageBucket: "real-educsen.firebasestorage.app",
        messagingSenderId: "80660233362",
        appId: "1:80660233362:web:5edf5060254170056eba4b"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const initLoader = document.getElementById('initLoader');
    const formWrap   = document.getElementById('formWrap');
    const submitBtn  = document.getElementById('submitBtn');
    const btnText    = document.getElementById('btnText');
    const btnSpin    = document.getElementById('btnSpin');
    const errorBox   = document.getElementById('errorBox');
    const inputs = ['d1','d2','d3','d4'].map(id => document.getElementById(id));
    const dots   = ['dot1','dot2','dot3','dot4'].map(id => document.getElementById(id));

    // ── AUTH CHECK — unique, avec détection session anonyme ──
    onAuthStateChanged(auth, async (user) => {
        initLoader.style.display = 'none';

        // ★ Si user anonyme (laissé par formulaire-note.html) → déconnexion propre
        if (user && user.isAnonymous) {
            await signOut(auth);
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userUid');
            window.location.replace('connexion.html');
            return;
        }

        if (!user) { window.location.replace('connexion.html'); return; }

        const userEmail = localStorage.getItem('userEmail');
        const userUid   = localStorage.getItem('userUid');
        if (!userEmail || !userUid) { window.location.replace('connexion.html'); return; }

        formWrap.classList.remove('hidden');
        setTimeout(() => inputs[0].focus(), 80);
        setupInputs();
    });

    // ── INPUTS ──
    function setupInputs() {
        inputs.forEach((inp, i) => {

            inp.addEventListener('focus', () => inp.select());

            inp.addEventListener('input', () => {
                inp.value = inp.value.replace(/\D/g, '');
                if (inp.value.length > 1) inp.value = inp.value.slice(-1);

                inp.classList.toggle('filled', inp.value !== '');
                inp.classList.remove('error');
                updateDots(); updateBtn();

                if (inp.value && i < 3) inputs[i + 1].focus();
                if (isComplete()) setTimeout(() => submitBtn.click(), 60);
            });

            inp.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !inp.value && i > 0) {
                    inputs[i-1].value = '';
                    inputs[i-1].classList.remove('filled');
                    inputs[i-1].focus();
                    updateDots(); updateBtn();
                }
                if (e.key === 'ArrowLeft'  && i > 0) inputs[i-1].focus();
                if (e.key === 'ArrowRight' && i < 3) inputs[i+1].focus();
            });

            inp.addEventListener('paste', (e) => {
                e.preventDefault();
                const digits = (e.clipboardData || window.clipboardData)
                    .getData('text').replace(/\D/g,'').slice(0,4).split('');
                digits.forEach((d, j) => {
                    if (inputs[j]) { inputs[j].value = d; inputs[j].classList.add('filled'); }
                });
                const last = Math.min(digits.length, 4) - 1;
                if (last >= 0) inputs[last].focus();
                updateDots(); updateBtn();
                if (isComplete()) setTimeout(() => submitBtn.click(), 80);
            });
        });
    }

    const isComplete = () => inputs.every(i => /^\d$/.test(i.value));

    function updateBtn()  { submitBtn.disabled = !isComplete(); }
    function updateDots() { inputs.forEach((inp,i) => dots[i].classList.toggle('active', inp.value !== '')); }

    // ── SUBMIT ──
    submitBtn.addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) { window.location.replace('connexion.html'); return; }
        if (!isComplete()) return;

        const code = inputs.map(i => i.value).join('');
        setLoading(true);
        errorBox.classList.remove('show');

        try {
            const snap = await getDoc(doc(db, 'users', user.uid));

            if (!snap.exists()) throw new Error('Aucun compte trouvé. Contactez le support.');

            const data = snap.data();

            if (data.codeSecret !== code) {
                inputs.forEach(i => i.classList.add('error'));
                throw new Error('Code incorrect. Veuillez réessayer.');
            }

            data.isConfigured === false
                ? window.location.replace('config.html')
                : window.location.replace('userdashboard.html');

        } catch (err) {
            setLoading(false);
            let msg = err.message || 'Erreur de vérification.';
            if (err.code === 'permission-denied') msg = 'Accès refusé. Vérifiez vos droits Firestore.';
            if (err.code === 'unavailable')       msg = 'Service indisponible. Vérifiez votre connexion.';
            showError('❌ ' + msg);
            if (msg.includes('incorrect')) {
                inputs.forEach(i => { i.value=''; i.classList.remove('filled'); });
                updateDots(); updateBtn();
                setTimeout(() => inputs[0].focus(), 120);
            }
        }
    });

    function setLoading(on) {
        btnText.textContent = on ? 'Vérification…' : 'Se connecter';
        btnSpin.classList.toggle('hidden', !on);
        submitBtn.disabled = on;
    }
    function showError(msg) {
        errorBox.textContent = msg;
        errorBox.classList.add('show');
    }
</script>
</body>
</html>
