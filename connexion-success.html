<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/images/icon-192x192.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion en cours · ÉducSen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #edf2f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .container { max-width: 480px; width: 100%; }
        .card {
            background: white;
            border-radius: 32px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 35px -8px rgba(0,20,30,0.15);
            text-align: center;
        }
        h1 { font-size: 1.9rem; font-weight: 700; color: #0a2e4a; margin-bottom: 1rem; }
        .spinner {
            display: inline-block;
            width: 3rem; height: 3rem;
            border: 4px solid rgba(37,99,235,0.2);
            border-radius: 50%;
            border-top-color: #2563eb;
            animation: spin 1s linear infinite;
            margin: 2rem 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message {
            margin: 1rem 0;
            padding: 1rem;
            border-radius: 14px;
            font-weight: 500;
        }
        .error { background: #fff5f5; color: #c53030; border-left: 4px solid #c53030; }
        .success { background: #e6f7e6; color: #1e7a44; }
        .btn {
            display: inline-block;
            background: #1e4c6b;
            color: white;
            font-weight: 600;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 1rem;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            width: 100%;
        }
        .btn:hover { background: #113946; }

        /* Zone de saisie email de secours */
        #emailFallback { margin-top: 1.5rem; }
        #emailFallback input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            outline: none;
            margin-bottom: 1rem;
        }
        #emailFallback input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        #emailFallback p { color: #4a6877; font-size: 0.9rem; margin-bottom: 1rem; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔐 Connexion sécurisée</h1>

            <!-- Loader par défaut -->
            <div id="status">
                <div class="spinner"></div>
                <p>Vérification du lien, veuillez patienter...</p>
            </div>

            <!-- Zone email de secours (si localStorage vide) -->
            <div id="emailFallback" class="hidden">
                <p>Confirmez votre adresse email pour finaliser la connexion :</p>
                <input type="email" id="emailInput" placeholder="votre@email.com" autocomplete="email">
                <button class="btn" id="confirmBtn">Confirmer et se connecter</button>
            </div>

            <div id="messageBox" class="message hidden"></div>
            <a href="/connexion.html" id="retryBtn" class="btn hidden">Retour à la connexion</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getAuth, isSignInWithEmailLink, signInWithEmailLink } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7B-0O9mOdbIDQV-g6hsZx07G2ZvzKoxo",
            authDomain: "real-educsen.firebaseapp.com",
            projectId: "real-educsen",
            storageBucket: "real-educsen.firebasestorage.app",
            messagingSenderId: "80660233362",
            appId: "1:80660233362:web:5edf5060254170056eba4b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const statusDiv = document.getElementById('status');
        const messageBox = document.getElementById('messageBox');
        const retryBtn = document.getElementById('retryBtn');
        const emailFallback = document.getElementById('emailFallback');
        const emailInput = document.getElementById('emailInput');
        const confirmBtn = document.getElementById('confirmBtn');

        function showMessage(text, type) {
            statusDiv.classList.add('hidden');
            emailFallback.classList.add('hidden');
            messageBox.textContent = text;
            messageBox.className = `message ${type}`;
            messageBox.classList.remove('hidden');
            if (type === 'error') retryBtn.classList.remove('hidden');
        }

        function finaliserConnexion(email) {
            signInWithEmailLink(auth, email, window.location.href)
                .then((result) => {
                    localStorage.setItem('userEmail', result.user.email);
                    localStorage.setItem('userUid', result.user.uid);
                    localStorage.removeItem('emailForSignIn');
                    showMessage('✅ Connexion réussie ! Redirection...', 'success');
                    setTimeout(() => {
                        window.location.href = '/codesecretuser.html';
                    }, 1000);
                })
                .catch((error) => {
                    console.error('Erreur de connexion :', error);
                    let message = 'Erreur lors de la connexion.';
                    if (error.code === 'auth/invalid-action-code') message = 'Lien expiré ou déjà utilisé. Demandez un nouveau lien.';
                    else if (error.code === 'auth/invalid-email') message = 'Email incorrect. Utilisez le même email qu\'à l\'envoi.';
                    showMessage(`❌ ${message}`, 'error');
                });
        }

        // Vérifier si le lien est valide
        if (!isSignInWithEmailLink(auth, window.location.href)) {
            showMessage('❌ Lien de connexion invalide ou expiré.', 'error');
        } else {
            // Lien valide — chercher l'email
            const email = localStorage.getItem('emailForSignIn');

            if (email) {
                // Email trouvé → connexion directe
                finaliserConnexion(email);
            } else {
       
                statusDiv.classList.add('hidden');
                emailFallback.classList.remove('hidden');

                confirmBtn.addEventListener('click', () => {
                    const saisie = emailInput.value.trim();
                    if (!saisie || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(saisie)) {
                        emailInput.style.borderColor = '#c53030';
                        return;
                    }
                    confirmBtn.disabled = true;
                    confirmBtn.textContent = 'Connexion en cours...';
                    finaliserConnexion(saisie);
                });
            }
        }
    </script>
</body>
</html>
